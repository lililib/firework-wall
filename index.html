<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎆 烟花寄语墙 | Firework Wall</title>
  <meta name="description" content="实时全网投屏的寄语烟花墙 — 输入文字，绽放成烟花，与所有在线访客同框。基于 Supabase 一站式架构，零后端运维。">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8E%86%3C/text%3E%3C/svg%3E">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div id="sky"></div>
  <canvas id="fireworksCanvas"></canvas>
  <canvas id="textCanvas"></canvas>

  <!-- 顶部按钮区 -->
  <header class="top-bar">
    <a href="https://github.com/lililib/firework-wall" class="back-home" target="_blank" rel="noopener" title="GitHub Repository">⭐ GitHub</a>
    <div class="action-group">
      <button id="replayAllBtn" class="btn-ghost" title="重放所有人的寄语">🔁 重放所有</button>
      <button id="replayMineBtn" class="btn-ghost" title="登录后可见" disabled>👤 重放自己</button>
      <button id="wallBtn" class="btn-ghost" title="留言墙">📜 留言墙</button>
    </div>
    <div class="user-area">
      <div id="onlineCountWrap">
        <span class="dot"></span>
        <span>在线 <span id="onlineCount">0</span></span>
      </div>
      <div id="loginStatus"><span class="muted">未登录</span></div>
      <button id="loginBtn" class="btn-primary-sm" data-action="login">登录 GitHub</button>
    </div>
  </header>

  <!-- 底部输入 UI -->
  <div id="ui-container">
    <input type="text" id="messageInput" placeholder="输入寄语 (登录后可永久保存)..." maxlength="10" autocomplete="off">
    <button id="launchBtn">🎆 即时燃放</button>
  </div>
  <p id="hint">未登录 — 仅本次广播。<a href="javascript:document.getElementById('loginBtn').click()">登录可永久留念 →</a></p>

  <!-- 留言墙抽屉 -->
  <aside id="messageWall" class="drawer" aria-hidden="true">
    <header class="drawer-header">
      <h2>📜 留言墙</h2>
      <button id="drawerCloseBtn" class="close-btn" aria-label="关闭">×</button>
    </header>
    <ul id="drawerList" class="drawer-list">
      <li class="loading">加载中...</li>
    </ul>
  </aside>

  <!-- Toast 提示 -->
  <div id="toast" role="status" aria-live="polite"></div>

  <script type="module" src="./main.js"></script>
</body>
</html>

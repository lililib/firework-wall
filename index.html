<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>烟花寄语墙 · Firework Wall</title>
  <meta name="description" content="实时投屏的寄语烟花墙 — 输入文字，绽放成烟花，与所有访客同框。">
  <link rel="icon" type="image/svg+xml" href="./favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <!-- ===== 背景层 ===== -->
  <div id="sky"></div>
  <canvas id="fireworksCanvas"></canvas>
  <canvas id="textCanvas"></canvas>

  <!-- ===== HUD 装饰层（四角 L + 上下渐变细线） ===== -->
  <div class="hud-layer">
    <span class="hud-corner tl"></span>
    <span class="hud-corner tr"></span>
    <span class="hud-corner bl"></span>
    <span class="hud-corner br"></span>
  </div>

  <!-- ===== 左上品牌 ===== -->
  <div class="brand">
    <h1 class="brand-title">烟 花 寄 语 墙</h1>
    <p class="brand-sub">FIREWORK · WALL</p>
  </div>

  <!-- ===== 右上信息条 ===== -->
  <div class="info-bar">
    <div class="chip" id="onlineChip">
      <span class="dot"></span>
      <span>在线 <span id="onlineCount">0</span></span>
    </div>
    <div class="avatar-wrap" id="avatarWrap">
      <div class="chip" id="loginChip"></div>
      <button class="avatar-arrow" id="avatarArrow" aria-label="账户菜单">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
      </button>
      <div class="avatar-menu" id="avatarMenu" aria-hidden="true">
        <button class="login-option" id="logoutBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          登出
        </button>
      </div>
    </div>
    <div class="login-wrap" id="loginWrap">
      <button id="loginBtn" class="btn-login" data-action="login">登录</button>
      <div class="login-menu" id="loginMenu" aria-hidden="true">
        <button class="login-option" id="loginGoogleBtn">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          谷歌 登录
        </button>
        <button class="login-option" id="loginGithubBtn">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 .3a12 12 0 0 0-3.8 23.4c.6.1.8-.3.8-.6v-2c-3.3.7-4-1.6-4-1.6-.6-1.4-1.4-1.8-1.4-1.8-1.1-.7.1-.7.1-.7 1.2.1 1.9 1.2 1.9 1.2 1.1 1.8 2.8 1.3 3.5 1 .1-.8.4-1.3.8-1.6-2.7-.3-5.5-1.3-5.5-6 0-1.3.5-2.4 1.2-3.2-.1-.3-.5-1.5.1-3.2 0 0 1-.3 3.3 1.2a11.5 11.5 0 0 1 6 0c2.3-1.5 3.3-1.2 3.3-1.2.7 1.7.2 2.9.1 3.2.8.8 1.2 1.9 1.2 3.2 0 4.6-2.8 5.6-5.5 5.9.4.4.8 1.1.8 2.2v3.3c0 .3.2.7.8.6A12 12 0 0 0 12 .3"/></svg>
          GitHub 登录
        </button>
      </div>
    </div>

    <!-- 音效开关 -->
    <button class="icon-btn" id="soundBtn" aria-label="关闭音效" title="关 闭 音 效">
      <svg class="icon-sound-on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
        <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
        <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
      </svg>
      <svg class="icon-sound-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
        <line x1="23" y1="9" x2="17" y2="15"/>
        <line x1="17" y1="9" x2="23" y2="15"/>
      </svg>
    </button>

    <!-- GitHub 仓库链接 -->
    <a class="icon-btn" href="https://github.com/lililib/firework-wall" target="_blank" rel="noopener" title="GitHub Repository" aria-label="GitHub Repository">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 .3a12 12 0 0 0-3.8 23.4c.6.1.8-.3.8-.6v-2c-3.3.7-4-1.6-4-1.6-.6-1.4-1.4-1.8-1.4-1.8-1.1-.7.1-.7.1-.7 1.2.1 1.9 1.2 1.9 1.2 1.1 1.8 2.8 1.3 3.5 1 .1-.8.4-1.3.8-1.6-2.7-.3-5.5-1.3-5.5-6 0-1.3.5-2.4 1.2-3.2-.1-.3-.5-1.5.1-3.2 0 0 1-.3 3.3 1.2a11.5 11.5 0 0 1 6 0c2.3-1.5 3.3-1.2 3.3-1.2.7 1.7.2 2.9.1 3.2.8.8 1.2 1.9 1.2 3.2 0 4.6-2.8 5.6-5.5 5.9.4.4.8 1.1.8 2.2v3.3c0 .3.2.7.8.6A12 12 0 0 0 12 .3"/></svg>
    </a>

    <!-- 菜单按钮（展开 3 个操作） -->
    <button class="icon-btn" id="menuBtn" aria-label="菜单" title="操作">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="4" y1="7"  x2="20" y2="7"/>
        <line x1="4" y1="12" x2="20" y2="12"/>
        <line x1="4" y1="17" x2="20" y2="17"/>
      </svg>
    </button>
  </div>

  <!-- ===== 操作下拉 ===== -->
  <div class="action-menu" id="actionMenu" role="menu" aria-hidden="true">
    <button id="replayAllBtn" type="button">
      <svg class="menu-ico" aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><polyline points="23 20 23 14 17 14"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
      <span>重放所有寄语</span>
    </button>
    <button id="replayMineBtn" type="button" disabled title="登录后可见">
      <svg class="menu-ico" aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span>重放自己的烟花</span>
    </button>
    <button id="wallBtn" type="button">
      <svg class="menu-ico" aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="16" y2="17"/></svg>
      <span>留言墙</span>
    </button>
  </div>

  <!-- ===== 底部输入区 ===== -->
  <div class="input-zone">
    <div class="elegant-input-wrap">
      <input type="text" id="messageInput" class="elegant-input" placeholder="书 写 你 的 寄 语" maxlength="10" autocomplete="off">
      <span class="input-counter" id="inputCounter">0 / 10</span>
      <p class="input-hint" id="hint">未登录 · 仅本次广播　<button class="inline-link" id="hintLoginLink">登录可永久留念 →</button></p>
    </div>
    <!-- 图片烟花：上传本地图片 -->
    <label class="btn-img-upload" id="imageUploadBtn" title="图片烟花" aria-label="上传图片烟花">
      <input type="file" id="imageInput" accept="image/*" style="display:none">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <circle cx="8.5" cy="8.5" r="1.5"/>
        <polyline points="21 15 16 10 5 21"/>
      </svg>
    </label>
    <button id="launchBtn" class="btn-launch">即 时 燃 放</button>
  </div>

  <!-- ===== 右下角场景切换 Dock ===== -->
  <div class="theme-dock-container">
    <div class="theme-dock" id="themeDock" role="listbox" aria-label="场景切换"></div>
    <button class="icon-btn" id="themeDockBtn" aria-label="切换场景" title="切换场景">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
        <circle cx="8.5" cy="8.5" r="1.5"/>
        <polyline points="21 15 16 10 5 21"/>
      </svg>
    </button>
  </div>

  <!-- ===== 留言墙抽屉 ===== -->
  <aside id="messageWall" class="drawer" aria-hidden="true">
    <header class="drawer-header">
      <h2>留 言 墙</h2>
      <button id="drawerCloseBtn" class="close-btn" aria-label="关闭">×</button>
    </header>
    <ul id="drawerList" class="drawer-list">
      <li class="loading">加 载 中</li>
    </ul>
  </aside>

  <!-- ===== Toast ===== -->
  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script type="module" src="./main.js"></script>
</body>
</html>
